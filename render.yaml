services:
  - type: web
    name: brasil-em-numeros
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # defina manualmente no painel do Render (ou conecte um Postgres do Render)
